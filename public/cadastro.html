<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Receita</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
<body>

<header class="py-3" style="background-color: #f76733;">
    </header>


<main class="container my-5">
    <h2 id="formTitle" class="text-center mb-4" style="color: #f76733;">Cadastrar Nova Receita</h2>
    
    <form id="formReceita" class="p-4 shadow-sm rounded">

        <div class="mb-3">
            <label for="title" class="form-label">Título da Receita</label>
            <input type="text" class="form-control" id="title" required>
        </div>

        <div class="mb-3">
            <label for="description" class="form-label">Descrição Breve</label>
            <textarea class="form-control" id="description" rows="2" required></textarea>
        </div>
        
        <div class="mb-3">
            <label for="imageUrl" class="form-label">URL da Imagem</label>
            <input type="url" class="form-control" id="imageUrl" required>
        </div>

        <div class="row">
            <div class="col-md-4 mb-3">
                <label for="tempo" class="form-label">Tempo de Preparo</label>
                <input type="text" class="form-control" id="tempo" placeholder="Ex: 45min" required>
            </div>
            <div class="col-md-4 mb-3">
                <label for="porcoes" class="form-label">Porções</label>
                <input type="text" class="form-control" id="porcoes" placeholder="Ex: 6 porções" required>
            </div>
            <div class="col-md-4 mb-3">
                <label for="categoria" class="form-label">Categoria</label>
                <select class="form-select" id="categoria" required>
                    <option value="" disabled selected>Selecione a Categoria</option>
                    <option value="Populares">Populares</option>
                    <option value="Melhores Sobremesas">Melhores Sobremesas</option>
                    <option value="Receitas Vegetarianas">Receitas Vegetarianas</option>
                </select>
            </div>
        </div>

        <div class="mb-3">
            <label for="ingredientes" class="form-label">Ingredientes (Separe por linha)</label>
            <textarea class="form-control" id="ingredientes" rows="5" required></textarea>
        </div>

        <div class="mb-3">
            <label for="modoPreparo" class="form-label">Modo de Preparo (Separe por passo)</label>
            <textarea class="form-control" id="modoPreparo" rows="5" required></textarea>
        </div>


        <div class="d-flex justify-content-end gap-2">
            <a href="index.html" class="btn btn-secondary">Cancelar</a>
            <button type="submit" id="submitButton" class="btn btn-success">Salvar Receita</button>
        </div>

    </form>
</main>


<footer class="p-3 text-center">
    <p>© 2025 Prato Online — Todos os direitos reservados.</p>
</footer>

<script src="js/app.js"></script> 
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
