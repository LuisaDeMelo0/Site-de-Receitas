<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuário - Prato Online</title>
    <!-- Inclui Bootstrap e Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .cadastro-container {
            width: 100%;
            max-width: 500px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            border-radius: 15px;
            background-color: white;
        }
        .btn-success-custom {
            background-color: #21558a; 
            border-color: #123559;
        }
        .btn-success-custom:hover {
            background-color: #1c4671;
            border-color: #163656;
        }

        .text-laranja-custom {
        color: #d74916 !important;
    }
    
    
    .text-primary, .btn-link {
        color: #001f3f !important; 
    }
        
    </style>
</head>
<body>

<div class="cadastro-container">
    <div id="message-container">
        
    </div>

    <h3 class="text-center mb-4 text-laranja-custom">
    <i class="fa-solid fa-user-plus"></i> Crie sua Conta
</h3>

    <p class="text-center text-muted">Junte-se à comunidade Prato Online e favorite suas receitas!</p>
    
    <form id="cadastroForm">
        <div class="mb-3">
            <label for="inputNome" class="form-label">Nome Completo</label>
            <input type="text" class="form-control" id="inputNome" required>
        </div>
        <div class="mb-3">
            <label for="inputEmail" class="form-label">Email</label>
            <input type="email" class="form-control" id="inputEmail" required>
        </div>
        <div class="mb-3">
            <label for="inputLogin" class="form-label">Login Desejado</label>
            <input type="text" class="form-control" id="inputLogin" required>
        </div>
        <div class="mb-3">
            <label for="inputSenha" class="form-label">Senha</label>
            <input type="password" class="form-control" id="inputSenha" required>
        </div>
        
        <div class="d-grid gap-2 mb-3">
            <button type="submit" class="btn btn-success-custom text-white">
                <i class="fa-solid fa-paper-plane"></i> Cadastrar
            </button>
        </div>
        <div class="text-center mt-3">
             Já tem conta? <a href="login.html">Faça Login</a>
        </div>
    </form>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/login.js"></script>

<script>
    document.getElementById('cadastroForm').addEventListener('submit', function(event) {
        event.preventDefault(); 
        
        const nome = document.getElementById('inputNome').value;
        const email = document.getElementById('inputEmail').value;
        const login = document.getElementById('inputLogin').value;
        const senha = document.getElementById('inputSenha').value;

        
        addUser(nome, login, senha, email);
    });
</script>

</body>
</html>
