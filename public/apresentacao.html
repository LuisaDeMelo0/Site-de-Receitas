<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apresentação Dinâmica de Receitas</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
    .header-bg { 
        background-color: #001f3f;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    body {
        font-family: Arial, sans-serif;
        background-color: #f8f9fa;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    .text-laranja-custom {
        color: #d74916 !important;
    }

    .text-azul-escuro-custom {
        color: #001f3f !important;
    }

    .bg-azul-escuro-custom {
        background-color: #001f3f !important;
    }

    .border-laranja-custom {
        border-color: #d74916 !important;
    }

    h1 {
        margin-bottom: 30px;
        font-weight: bold;
        color: #001f3f;
        text-align: center;
    }

    #grafico-container {
        width: 100%;
        max-width: 900px;
        margin: 20px auto;
    }
    
    .chart-card {
        background-color: white;
        border-radius: 15px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        padding: 30px;
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 400px;
    }

    canvas {
        max-height: 500px;
    }

    .btn-azul-escuro {
        background-color: #155ea6;
        border-color: #155ea6;
        color: white;
        margin-right: 7rem;
        font-size: 1rem;
    }

    .btn-azul-escuro:hover {
        background-color: #003366;
        border-color: #003366;
    }
    </style>
</head>

<body>

    <div class="ms-auto">
        <a href="index.html" class="btn btn-azul-escuro btn-sm">Voltar</a>
    </div>

    <h1 class="text-center text-laranja-custom">
        <i class="fa-solid fa-chart-pie me-2"></i> Distribuição de Receitas por Categoria
    </h1>

    <div id="grafico-container">
        <div class="chart-card">
            <canvas id="graficoPizza"></canvas>
            <p id="no-data-message" class="text-muted text-center position-absolute" style="display: none;">
                Nenhum dado de categoria disponível para exibir o gráfico.
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/apresentacao.js"></script> 

</body>
</html>
