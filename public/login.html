<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Prato Online</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            border-radius: 15px;
            background-color: white;
        }
        .btn-custom {
            background-color: #f76733; /* Vermelho */
            border-color: #f76733;
        }
        .btn-custom:hover {
            background-color: #d74916;
            border-color: #bd2130;
        }

        .text-primary, .btn-link {
        color: #21558a !important; /* Azul Escuro */
    }
    
    .btn-link:hover {
        color: #21558a !important; 
    }

    </style>
</head>
<body>

<div class="login-container">
    <div id="message-container">
        <!-- Mensagens de erro/sucesso -->
    </div>
    <h3 class="text-center mb-4 text-primary">
        <i class="fa-solid fa-lock"></i> Acesso Restrito
    </h3>
    <p class="text-center text-muted">Entre com suas credenciais ou <a href="cadastro_usuario.html">crie uma conta</a>.</p>
    
    <form id="loginForm">
        <div class="mb-3">
            <label for="inputLogin" class="form-label">Login</label>
            <input type="text" class="form-control" id="inputLogin" required>
        </div>
        <div class="mb-3">
            <label for="inputSenha" class="form-label">Senha</label>
            <input type="password" class="form-control" id="inputSenha" required>
        </div>
        <div class="d-grid gap-2 mb-3">
            <button type="submit" class="btn btn-custom text-white">
                <i class="fa-solid fa-sign-in-alt"></i> Entrar
            </button>
        </div>
        <div class="text-center mt-3">
             <a href="index.html" class="btn btn-link"><i class="fa-solid fa-arrow-left"></i> Voltar para Home</a>
        </div>
    </form>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/login.js"></script>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(event) {
        event.preventDefault(); 
        
        const login = document.getElementById('inputLogin').value;
        const senha = document.getElementById('inputSenha').value;

        // Chama a função de login do módulo login.js
        loginUser(login, senha);
    });
</script>

</body>
</html>
