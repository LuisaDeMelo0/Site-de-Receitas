<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minhas Receitas Favoritas - Prato Online</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <style>
        body { font-family: Arial, sans-serif; background-color: #f8f9fa; }
        
        /* 🧡 CABEÇALHO - De vermelho (danger) para azul escuro */
        .header-bg { 
            background-color: #001f3f; /* Azul Escuro */
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }
        .nav-link { color: #f8f9fa !important; transition: color 0.3s; }
        .nav-link:hover { color: #d74916 !important; /* Laranja no Hover */ }
        
        .card-img-top { height: 200px; object-fit: cover; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .empty-placeholder { min-height: 220px; display:flex; align-items:center; justify-content:center; }
        
        /* 🎨 CLASSES PERSONALIZADAS PARA O TEMA */
        .text-laranja-custom {
            color: #d74916 !important;
        }
        .btn-laranja-outline {
            color: #d74916;
            border-color: #d74916;
        }
        .btn-laranja-outline:hover {
            background-color: #d74916;
            color: white;
        }
        .bg-laranja-custom {
            background-color: #d74916 !important;
        }
        .text-azul-escuro-custom {
            color: #033e7a !important;
        }
        .btn-azul-escuro {
            background-color: #155ea6;
            border-color: #001f3f;
            color: white;
            font-size: 1rem;
        }
        .btn-azul-escuro:hover {
            background-color: #003366;
            border-color: #003366;
        }

        .text-laranja-custom {
        color: #d74916 !important; /* Laranja Escuro solicitado */
    }
    
    .btn-azul-escuro i {
    color: white !important;
}
    </style>
    
</head>
<body>


<main class="container mt-5 mb-5">
    <div id="message-container"></div>

    <div class="d-flex align-items-center mb-4">
        <h1 class="text-laranja-custom me-3"><i class="fa-solid fa-heart"></i> Minhas Receitas Favoritas</h1>
        <span class="badge bg-laranja-custom rounded-pill fs-5" id="totalFavoritos">0</span>
        <div class="ms-auto">
            <a href="index.html" class="btn btn-azul-escuro btn-sm">Voltar</a>
        </div>
    </div>

    <p class="text-muted">Aqui você encontra todas as receitas que salvou para ver mais tarde.</p>

    <div id="favorite-recipes-list" class="row g-4">
        </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/login.js"></script>

<script>
const API_RECEITAS = "http://localhost:3000/receitas";
const API_FAVORITOS = "http://localhost:3000/favoritos";

function showSpinner(container) {
    container.innerHTML = `
        <div class="col-12 text-center my-5">
            <div class="spinner-border text-laranja-custom" role="status"><span class="visually-hidden">Carregando...</span></div>
            <p class="mt-2 text-secondary">Carregando seus itens favoritos...</p>
        </div>
    `;
}

async function carregarFavoritos() {
    // ... (restante do código de verificação de login permanece o mesmo) ...
    const usuario = JSON.parse(sessionStorage.getItem("usuarioCorrente"));
    const lista = document.getElementById("favorite-recipes-list");
    const totalBadge = document.getElementById("totalFavoritos");

    if (!usuario || !usuario.id) {
        if (typeof displayMessage === "function") {
            displayMessage("Você precisa estar logado para ver seus favoritos.");
        } else {
            alert("Você precisa estar logado para ver seus favoritos.");
        }
        setTimeout(() => window.location.href = (typeof LOGIN_URL !== "undefined" ? LOGIN_URL : "login.html"), 800);
        return;
    }

    try {
        showSpinner(lista);

        const respFav = await fetch(`${API_FAVORITOS}?userId=${usuario.id}`);
        if (!respFav.ok) throw new Error("Falha ao obter favoritos");
        const favoritos = await respFav.json();

        if (!Array.isArray(favoritos) || favoritos.length === 0) {
            lista.innerHTML = `
                <div class="col-12">
                    <div class="card p-5 text-center text-secondary shadow-sm empty-placeholder">
                        <div>
                            <p class="lead mb-2">
                                <i class="fa-solid fa-magnifying-glass me-2"></i>
                                Nenhuma receita favorita encontrada.
                            </p>
                            <p class="mb-0">Explore a <a href="index.html">Página Inicial</a> para encontrar a sua próxima receita!</p>
                        </div>
                    </div>
                </div>
            `;
            totalBadge.textContent = "0";
            return;
        }

        totalBadge.textContent = String(favoritos.length);
        lista.innerHTML = "";

        // Buscando os dados de cada receita
        for (const fav of favoritos) {
            try {
                const respRec = await fetch(`${API_RECEITAS}/${fav.receitaId}`);
                if (!respRec.ok) {
                    console.warn(`Receita ${fav.receitaId} não encontrada.`);
                    continue;
                }
                const receita = await respRec.json();

                lista.innerHTML += `
                    <div class="col-md-4">
                        <div class="card shadow-sm h-100">
                            <img src="${receita.imageUrl}" class="card-img-top" alt="${escapeHtml(receita.title)}">
                            <div class="card-body d-flex flex-column">
                                <h5 class="card-title text-azul-escuro-custom">${escapeHtml(receita.title)}</h5>
                                <p class="card-text text-muted small mb-3">${escapeHtml(truncate(receita.description || "", 120))}</p>
                                <div class="mt-auto d-flex gap-2">
                                    <a href="detalhes.html?id=${receita.id}" class="btn btn-azul-escuro btn-sm">Ver Receita</a>
                                    <button class="btn btn-azul-escuro btn-sm ms-auto" onclick="confirmRemover('${fav.id}', '${escapeJs(fav.receitaId)}', event)">
                                    <i class="fa-solid fa-trash"></i> Remover
                                    </button>

                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } catch (innerErr) {
                console.error("Erro ao carregar receita:", innerErr);
            }
        }

    } catch (error) {
        console.error("Erro ao carregar favoritos:", error);
        const lista = document.getElementById("favorite-recipes-list");
        lista.innerHTML = `
            <div class="col-12">
                <div class="card p-4 text-center text-laranja-custom shadow-sm">
                    <p class="mb-0">Erro ao carregar seus favoritos. Tente novamente mais tarde.</p>
                </div>
            </div>
        `;
    }
}

function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>"']/g, function(m){ return ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" })[m]; });
}

function escapeJs(str) {
    return (str || "").replace(/'/g, "\\'").replace(/"/g, '\\"');
}

function truncate(text, max) {
    if (!text) return "";
    return text.length > max ? text.slice(0, max - 1) + "…" : text;
}

function confirmRemover(favId, receitaId, event) {
    event?.preventDefault();
    if (confirm("Remover este favorito?")) {
        removerFavorito(favId);
    }
}

async function removerFavorito(idFav) {
    try {
        const resp = await fetch(`${API_FAVORITOS}/${idFav}`, { method: "DELETE" });
        if (!resp.ok) throw new Error("Falha ao remover");
        carregarFavoritos();
    } catch (err) {
        console.error("Erro ao remover favorito:", err);
        alert("Não foi possível remover o favorito. Tente novamente.");
    }
}

// Carrega ao abrir a página
document.addEventListener("DOMContentLoaded", function() {
    carregarFavoritos();
});
</script>

</body>
</html>
